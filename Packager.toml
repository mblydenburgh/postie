[package]
product-name = "Posite"
version = "0.0.12"
description = "Lightweight HTTP GUI client for API testing"
authors = ["Michael Blydenburgh"]
identifier = "com.mblydenburgh.postie"

# binary generated by cargo build
binaries = [
{ filename = "gui", main = "true" }
]

# external files to be included in bundle
resources = [
  "postie.sqlite",
  "scripts/resources/**/*"
]

[out_dir]
path = "target/release/bundle"

[macos]
icon = "scripts/resources/postie.png"
minimum_system_version = "10.13"

[linux]
formats = ["appimage", "deb"]
desktop-template = "scripts/resources/postie.desktop"

[windows]
formats = ["msi", "zip"]
