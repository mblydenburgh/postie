name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      is_prerelease:
        description: 'Check if this is a pre-release'
        required: true
        type: boolean
        default: true

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--formats dmg,app'
          - platform: 'windows-latest'
            args: '--formats nsis'
          - platform: 'ubuntu-22.04'
            args: '--formats appimage,deb'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwayland-dev libxkbcommon-dev libasound2-dev

      - name: Install Rust
        run: rustup update stable

      # download prebuilt OS-specific binary instead of building from scratch with cargo install
      - name: Install cargo-packager
        shell: bash
        run: |
          VERSION="latest"
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            URL="https://github.com/crabnebula-dev/cargo-packager/releases/latest/download/cargo-packager-x86_64-unknown-linux-gnu.tar.gz"
            curl -L "$URL" | tar xz
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            URL="https://github.com/crabnebula-dev/cargo-packager/releases/latest/download/cargo-packager-x86_64-apple-darwin.tar.gz"
            curl -L "$URL" | tar xz
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            URL="https://github.com/crabnebula-dev/cargo-packager/releases/latest/download/cargo-packager-x86_64-pc-windows-msvc.zip"
            curl -L "$URL" -o packager.zip
            unzip -o packager.zip
          fi
          chmod +x cargo-packager*
          # Move it to a place in the PATH
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv cargo-packager.exe /usr/bin/
          else
            sudo mv cargo-packager /usr/local/bin/
          fi

      - name: Install NSIS (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install nsis

      - name: Build and Package
        run: NO_STRIP=1 cargo-packager --release -p gui ${{ matrix.args }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: postie-binaries-${{ matrix.platform }}
          path: target/**/release/bundle/*

  create-release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: postie-binaries-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # If manual, use the input. If tag push, it's a full release (false).
          prerelease: ${{ github.event.inputs.is_prerelease || false }}
          files: ./artifacts/**/*
          # Use the tag name if triggered by tag, otherwise use a generic name
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
