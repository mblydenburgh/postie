name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      is_prerelease:
        description: "Check if this is a pre-release"
        required: true
        type: boolean
        default: true

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--formats dmg,app"
          - platform: "windows-latest"
            args: "--formats msi,zip"
          - platform: "ubuntu-22.04"
            args: "--formats appimage,deb,rpm"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: matrix.platform == "ubuntu-22.04"
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwayland-dev libxkbcommon-dev libasound2-dev

      - name: Install Rust
        run: rustup update stable

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build and Package
        run: cargo packager --release ${{ matrix.args }}

      # Upload the files so the 'release' job can find them
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: postie-binaries-${{ matrix.platform }}
          path: target/release/bundle/

  create-release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: postie-binaries-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # If manual, use the input. If tag push, it's a full release (false).
          prerelease: ${{ github.event.inputs.is_prerelease || false }}
          files: ./artifacts/**/*
          # Use the tag name if triggered by tag, otherwise use a generic name
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
